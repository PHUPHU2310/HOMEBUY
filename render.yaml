services:
  - type: web
    name: homebuy-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: homebuy-landing
    runtime: node
    buildCommand: cd landing && npm install && npm run build
    startCommand: cd landing && npm start
    envVars:
      - key: PORT
        value: 3001

  - type: web
    name: homebuy-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: PORT
        value: 3000
